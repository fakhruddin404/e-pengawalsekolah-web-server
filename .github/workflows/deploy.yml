name: Deploy Laravel Inertia

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy ke Server Azure
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/e_pengawalsekolah

            # 1. RAMPAS HAK MILIK SEMENTARA
            # Supaya Git (epsadmin) boleh ubah/padam fail tanpa dihalang (Permission denied)
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S chown -R $USER:$USER .

            # 2. Tarik kod terkini dari GitHub
            git fetch --all
            git reset --hard origin/main
            git pull origin main

            # 3. Kemas kini pakej Backend
            composer install --no-dev --optimize-autoloader

            # 4. Masak fail UI Frontend (Buang folder build lama dulu untuk elak isu Vite)
            rm -rf public/build
            npm install
            npm run build

            # 5. Cuci cache Laravel & Route (Jalankan sebagai epsadmin biasa)
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # 6. SERAH SEMULA HAK KEPADA NGINX SELEPAS SELESAI
            # Supaya pengguna web boleh muat naik gambar ke public/pentadbirImej & baca cache
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S chown -R www-data:www-data storage bootstrap/cache public
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S chmod -R 775 storage bootstrap/cache public