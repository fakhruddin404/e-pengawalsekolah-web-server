name: Deploy Laravel Inertia

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy ke Server Azure
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /var/www/e_pengawalsekolah

            # 1. Reset dan tarik kod terkini
            git fetch --all
            git reset --hard origin/main
            git pull origin main

            # 2. Kemas kini pakej Backend
            composer install --no-dev --optimize-autoloader

            # 3. Pastikan permission Laravel konsisten (log/cache ditulis oleh www-data).
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S mkdir -p storage/logs bootstrap/cache
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S chown -R www-data:www-data storage bootstrap/cache
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S chmod -R 775 storage bootstrap/cache

            # 4. Benarkan user deploy menulis build Vite (public/build).
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S chown -R "$USER:$USER" public
            rm -rf public/build

            # 5. Masak fail UI Frontend
            npm ci
            npm run build

            # 6. Cuci cache Laravel & Route (jalan sebagai www-data untuk elak isu permission log/cache)
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S -u www-data php artisan migrate --force
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S -u www-data php artisan optimize:clear
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S -u www-data php artisan config:cache
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S -u www-data php artisan route:cache
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S -u www-data php artisan view:cache

            # 7. SET PERMISSION SELEPAS BUILD
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S chown -R www-data:www-data public/build storage bootstrap/cache
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S chmod -R 775 public/build storage bootstrap/cache